name: Publish Release

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  BINARY_NAME: awscope

jobs:
  build-artifacts:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute build metadata
        id: meta
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          git fetch --force --tags
          commit="$(git rev-list -n 1 "$tag")"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "commit=$commit" >>"$GITHUB_OUTPUT"
          echo "published_at=${{ github.event.release.published_at }}" >>"$GITHUB_OUTPUT"

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          PUBLISHED_AT: ${{ steps.meta.outputs.published_at }}
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath \
            -ldflags "-s -w -X awscope/internal/buildinfo.Version=v${VERSION} -X awscope/internal/buildinfo.Commit=${COMMIT} -X awscope/internal/buildinfo.Date=${PUBLISHED_AT}" \
            -o "dist/${BINARY_NAME}" \
            ./cmd/awscope
          archive="${BINARY_NAME}_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar -C dist -czf "dist/${archive}" "${BINARY_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-assets:
    name: publish-assets
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          merge-multiple: true
          path: artifacts

      - name: Create checksums
        id: checksums
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          mkdir -p release-assets
          checksums_file="release-assets/${BINARY_NAME}_${version}_checksums.txt"
          : >"$checksums_file"

          while IFS= read -r file; do
            base="$(basename "$file")"
            sha="$(sha256sum "$file" | awk '{print $1}')"
            printf "%s  %s\n" "$sha" "$base" >>"$checksums_file"
            cp "$file" "release-assets/${base}"
          done < <(find artifacts -type f -name "${BINARY_NAME}_${version}_*.tar.gz" | sort)

          if [ ! -s "$checksums_file" ]; then
            echo "No release archives found for ${version}" >&2
            exit 1
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          overwrite_files: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.txt

  update-homebrew:
    name: update-homebrew
    runs-on: ubuntu-latest
    needs:
      - publish-assets
    steps:
      - name: Download macOS release archives
        id: cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          mkdir -p dist

          gh release download "$tag" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "${BINARY_NAME}_${version}_darwin_amd64.tar.gz" \
            --pattern "${BINARY_NAME}_${version}_darwin_arm64.tar.gz"

          amd64_sha="$(sha256sum "dist/${BINARY_NAME}_${version}_darwin_amd64.tar.gz" | awk '{print $1}')"
          arm64_sha="$(sha256sum "dist/${BINARY_NAME}_${version}_darwin_arm64.tar.gz" | awk '{print $1}')"

          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "amd64_sha=$amd64_sha" >>"$GITHUB_OUTPUT"
          echo "arm64_sha=$arm64_sha" >>"$GITHUB_OUTPUT"

      - name: Update Homebrew tap cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.cask.outputs.version }}
          AMD64_SHA: ${{ steps.cask.outputs.amd64_sha }}
          ARM64_SHA: ${{ steps.cask.outputs.arm64_sha }}
        run: |
          set -euo pipefail
          tap_repo="iesoftek/homebrew-tap"
          workdir="$(mktemp -d)"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${tap_repo}.git" "${workdir}/tap"
          mkdir -p "${workdir}/tap/Casks"

          cat > "${workdir}/tap/Casks/awscope.rb" <<EOF
cask "awscope" do
  version "${VERSION}"

  on_arm do
    sha256 "${ARM64_SHA}"
    url "https://github.com/iesoftek/awscope/releases/download/v#{version}/awscope_#{version}_darwin_arm64.tar.gz"
  end

  on_intel do
    sha256 "${AMD64_SHA}"
    url "https://github.com/iesoftek/awscope/releases/download/v#{version}/awscope_#{version}_darwin_amd64.tar.gz"
  end

  name "awscope"
  desc "AWS inventory scanner and interactive TUI"
  homepage "https://github.com/iesoftek/awscope"

  binary "awscope"

  zap trash: "~/.config/awscope"
end
EOF

          cd "${workdir}/tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/awscope.rb

          if git diff --cached --quiet; then
            echo "No Homebrew updates detected."
            exit 0
          fi

          git commit -m "awscope ${VERSION}"
          git push origin HEAD:main
